<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EURCV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #f0f6fc; }
    header p { margin-top: 0.35rem; font-size: 0.85rem; color: #8b949e; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 1200px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .chart-wrap { position: relative; height: 340px; }

    #last-updated { margin-top: 2rem; font-size: 0.75rem; color: #484f58; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .card-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 2px;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }

    .toggle-btn.active {
      background: #21262d;
      color: #f0f6fc;
    }

    .toggle-btn svg { display: block; }

    /* External tooltip */
    .chart-tooltip {
      position: absolute;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      min-width: 220px;
      z-index: 10;
      font-size: 0.82rem;
    }

    .tt-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #30363d;
    }

    .tt-date  { color: #8b949e; font-size: 0.78rem; }
    .tt-total { color: #f0f6fc; font-weight: 700; font-size: 0.9rem; white-space: nowrap; }

    .tt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .tt-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tt-label { color: #8b949e; flex: 1; }
    .tt-value { color: #e6edf3; font-weight: 500; white-space: nowrap; }
  </style>
</head>
<body>
  <header>
    <h1>EUR CoinVertible (EURCV)</h1>
    <p>Supply · Données on-chain · Ethereum + Solana + XRP Ledger</p>
  </header>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <h2 id="mcap-title">Market Capitalisation (USD)</h2>
        <div class="card-controls">
          <!-- chart-type toggle -->
          <div class="toggle-wrap">
            <button class="toggle-btn active" id="mcap-btn-line" onclick="setMcapView('line')" title="Courbe">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <polyline points="1,12 5,7 8,9 11,4 15,6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="toggle-btn" id="mcap-btn-pie" onclick="setMcapView('pie')" title="Camembert">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 8 L8 1.5 A6.5 6.5 0 1 1 2.3 11.2 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M8 8 L8 1.5 A6.5 6.5 0 0 0 2.3 11.2 Z" fill="currentColor" opacity="0.25"/>
              </svg>
            </button>
          </div>
          <!-- currency toggle -->
          <div class="toggle-wrap" id="mcap-currency-toggle">
            <button class="toggle-btn active" id="btn-usd" onclick="setCurrency('USD')">USD</button>
            <button class="toggle-btn"        id="btn-eur" onclick="setCurrency('EUR')">EUR</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-mcap"></canvas></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Nombre de Holders</h2>
        <div class="toggle-wrap">
          <button class="toggle-btn active" id="holders-btn-line" onclick="setHoldersView('line')" title="Courbe">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <polyline points="1,12 5,7 8,9 11,4 15,6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="toggle-btn" id="holders-btn-pie" onclick="setHoldersView('pie')" title="Camembert">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 8 L8 1.5 A6.5 6.5 0 1 1 2.3 11.2 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M8 8 L8 1.5 A6.5 6.5 0 0 0 2.3 11.2 Z" fill="currentColor" opacity="0.25"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-holders"></canvas></div>
    </div>
  </div>

  <p id="last-updated"></p>

  <script>
    const CHAINS = [
      { label: 'Ethereum',   color: '#627EEA', mcapFile: 'data/marketcap.json',       holdersFile: 'data/holders.json' },
      { label: 'Solana',     color: '#9945FF', mcapFile: 'data/sol_marketcap.json',    holdersFile: 'data/sol_holders.json' },
      { label: 'XRP Ledger', color: '#00B4A0', mcapFile: 'data/xrpl_marketcap.json',   holdersFile: 'data/xrpl_holders.json' },
      { label: 'Stellar',    color: '#2D9CDB', mcapFile: 'data/stellar_marketcap.json', holdersFile: 'data/stellar_holders.json' },
    ];

    // ── Formatters ──────────────────────────────────────────────────────────────
    function fmtSpaced(v) {
      return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    }

    function fmtUSD(v)  { return '$ ' + fmtSpaced(v); }
    function fmtEUR(v)  { return '€ ' + fmtSpaced(v); }

    function fmtAxisUSD(v) {
      if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
      return '$' + v;
    }

    function fmtAxisEUR(v) {
      if (v >= 1e9) return '€' + (v / 1e9).toFixed(1) + 'B';
      if (v >= 1e6) return '€' + (v / 1e6).toFixed(0) + 'M';
      if (v >= 1e3) return '€' + (v / 1e3).toFixed(0) + 'K';
      return '€' + v;
    }

    function fmtDate(s) {
      const [y, m, d] = s.split('-');
      return `${d}/${m}/${String(y).slice(2)}`;
    }

    // ── Stacked area helpers ────────────────────────────────────────────────────
    function buildStacked(seriesArr, valueKey) {
      const paired = CHAINS.map((chain, i) => ({
        chain,
        series: seriesArr[i],
        startDate: seriesArr[i][0]?.date || '9999-12-31',
      }));

      paired.sort((a, b) => a.startDate < b.startDate ? -1 : 1);

      const dateSet = new Set(paired.flatMap(p => p.series.map(d => d.date)));
      const allDates = [...dateSet].sort();

      const filled = paired.map(({ series, startDate }) => {
        const map = Object.fromEntries(series.map(d => [d.date, d[valueKey]]));
        let last = 0;
        return allDates.map(date => {
          if (date < startDate) return 0;
          if (date in map) last = map[date];
          return last;
        });
      });

      return { labels: allDates.map(fmtDate), rawDates: allDates, paired, filled };
    }

    // External tooltip for line charts
    function makeTooltipHandler(fmtVal, paired) {
      return function({ chart, tooltip }) {
        let el = chart._ttEl;
        if (!el) {
          el = document.createElement('div');
          el.className = 'chart-tooltip';
          chart.canvas.parentElement.style.position = 'relative';
          chart.canvas.parentElement.appendChild(el);
          chart._ttEl = el;
        }

        if (tooltip.opacity === 0) { el.style.opacity = '0'; return; }

        const items = tooltip.dataPoints || [];
        if (!items.length) return;

        const date = items[0].label;
        const activeItems = items.filter(i => (i.raw || 0) > 0);
        if (!activeItems.length) return;
        const total = activeItems.reduce((s, i) => s + i.raw, 0);

        const rows = [...activeItems].reverse().map(item => {
          const chain = paired.find(p => p.chain.label === item.dataset.label)?.chain || {};
          return `<div class="tt-row">
            <div class="tt-dot" style="background:${chain.color || '#888'}"></div>
            <span class="tt-label">${item.dataset.label}</span>
            <span class="tt-value">${fmtVal(item.raw || 0)}</span>
          </div>`;
        }).join('');

        el.innerHTML = `
          <div class="tt-header">
            <span class="tt-date">${date}</span>
            <span class="tt-total">${fmtVal(total)}</span>
          </div>
          ${rows}
        `;

        const cx = tooltip.caretX;
        const cy = tooltip.caretY;
        const ttW = 240;
        el.style.opacity = '1';
        el.style.top = Math.max(0, cy - 20) + 'px';
        el.style.left = (cx + ttW + 20 > chart.width ? cx - ttW - 10 : cx + 14) + 'px';
      };
    }

    // ── Line chart ──────────────────────────────────────────────────────────────
    function buildLineChart(canvasId, stackedData, fmtVal, fmtAxis) {
      const { labels, paired, filled } = stackedData;
      const ctx = document.getElementById(canvasId).getContext('2d');

      const datasets = [...paired].reverse().map((p, revIdx) => {
        const origIdx = paired.length - 1 - revIdx;
        return {
          label: p.chain.label,
          data: filled[origIdx],
          borderColor: p.chain.color,
          backgroundColor: p.chain.color + 'B3',
          borderWidth: 1.5,
          fill: true,
          tension: 0.15,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: p.chain.color,
          pointHoverBorderColor: '#1c2128',
          pointHoverBorderWidth: 2,
        };
      });

      return new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              align: 'end',
              labels: { color: '#8b949e', usePointStyle: true, pointStyle: 'circle', boxWidth: 8, padding: 16, font: { size: 12 } },
            },
            tooltip: { enabled: false, external: makeTooltipHandler(fmtVal, paired) },
          },
          scales: {
            x: { ticks: { color: '#8b949e', maxTicksLimit: 8, maxRotation: 0 }, grid: { color: '#21262d' } },
            y: { stacked: true, beginAtZero: true, ticks: { color: '#8b949e', callback: fmtAxis }, grid: { color: '#21262d' } },
          },
        },
      });
    }

    // ── Doughnut chart ──────────────────────────────────────────────────────────
    // Shows the latest known value per active chain.
    function getLatestValues(seriesArr, valueKey) {
      return seriesArr.map(series => {
        if (!series || !series.length) return 0;
        for (let i = series.length - 1; i >= 0; i--) {
          const v = series[i][valueKey];
          if (v != null && v > 0) return v;
        }
        return 0;
      });
    }

    function buildDoughnutChart(canvasId, seriesArr, valueKey, fmtVal) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      const values = getLatestValues(seriesArr, valueKey);
      const active = CHAINS.map((chain, i) => ({ chain, value: values[i] })).filter(d => d.value > 0);
      const total  = active.reduce((s, d) => s + d.value, 0);

      return new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: active.map(d => d.chain.label),
          datasets: [{
            data: active.map(d => d.value),
            backgroundColor: active.map(d => d.chain.color + 'B3'),
            borderColor: active.map(d => d.chain.color),
            borderWidth: 1.5,
            hoverOffset: 10,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '58%',
          plugins: {
            legend: {
              display: true,
              position: 'right',
              labels: { color: '#8b949e', usePointStyle: true, pointStyle: 'circle', boxWidth: 8, padding: 16, font: { size: 12 } },
            },
            tooltip: {
              backgroundColor: '#1c2128',
              borderColor: '#30363d',
              borderWidth: 1,
              titleColor: '#8b949e',
              bodyColor: '#e6edf3',
              padding: 10,
              callbacks: {
                label: ctx => {
                  const pct = total > 0 ? ((ctx.raw / total) * 100).toFixed(1) : '0.0';
                  return `  ${fmtVal(ctx.raw)}  (${pct}%)`;
                },
              },
            },
          },
        },
      });
    }

    // ── State ───────────────────────────────────────────────────────────────────
    let currentCurrency  = 'USD';
    let mcapViewMode     = 'line';
    let holdersViewMode  = 'line';
    let mcapSeriesData   = null;
    let holdersSeriesData = null;
    let mcapChartInstance    = null;
    let holdersChartInstance = null;

    function rebuildMcap() {
      if (mcapChartInstance) mcapChartInstance.destroy();
      const valueKey = currentCurrency === 'USD' ? 'marketcap' : 'supply';
      const fmtVal   = currentCurrency === 'USD' ? fmtUSD : fmtEUR;
      const fmtAxis  = currentCurrency === 'USD' ? fmtAxisUSD : fmtAxisEUR;

      if (mcapViewMode === 'line') {
        mcapChartInstance = buildLineChart('chart-mcap', buildStacked(mcapSeriesData, valueKey), fmtVal, fmtAxis);
      } else {
        mcapChartInstance = buildDoughnutChart('chart-mcap', mcapSeriesData, valueKey, fmtVal);
      }
    }

    function rebuildHolders() {
      if (holdersChartInstance) holdersChartInstance.destroy();
      const fmtVal  = v => fmtSpaced(v) + ' holders';
      const fmtAxis = v => fmtSpaced(v);

      if (holdersViewMode === 'line') {
        holdersChartInstance = buildLineChart('chart-holders', buildStacked(holdersSeriesData, 'holders'), fmtVal, fmtAxis);
      } else {
        holdersChartInstance = buildDoughnutChart('chart-holders', holdersSeriesData, 'holders', fmtVal);
      }
    }

    function setCurrency(currency) {
      if (currency === currentCurrency) return;
      currentCurrency = currency;
      document.getElementById('btn-usd').classList.toggle('active', currency === 'USD');
      document.getElementById('btn-eur').classList.toggle('active', currency === 'EUR');
      document.getElementById('mcap-title').textContent =
        currency === 'USD' ? 'Market Capitalisation (USD)' : 'Market Capitalisation (EUR)';
      rebuildMcap();
    }

    function setMcapView(mode) {
      if (mode === mcapViewMode) return;
      mcapViewMode = mode;
      document.getElementById('mcap-btn-line').classList.toggle('active', mode === 'line');
      document.getElementById('mcap-btn-pie').classList.toggle('active',  mode === 'pie');
      rebuildMcap();
    }

    function setHoldersView(mode) {
      if (mode === holdersViewMode) return;
      holdersViewMode = mode;
      document.getElementById('holders-btn-line').classList.toggle('active', mode === 'line');
      document.getElementById('holders-btn-pie').classList.toggle('active',  mode === 'pie');
      rebuildHolders();
    }

    // ── Init ────────────────────────────────────────────────────────────────────
    async function init() {
      const files = CHAINS.flatMap(c => [c.mcapFile, c.holdersFile]);
      const results = await Promise.all(
        files.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(() => []))
      );

      mcapSeriesData    = CHAINS.map((_, i) => results[i * 2]);
      holdersSeriesData = CHAINS.map((_, i) => results[i * 2 + 1]);

      rebuildMcap();
      rebuildHolders();

      document.getElementById('last-updated').textContent =
        'Dernière mise à jour : ' + new Date().toLocaleString('fr-FR', { timeZone: 'UTC' }) + ' UTC';
    }

    init();
  </script>
</body>
</html>
